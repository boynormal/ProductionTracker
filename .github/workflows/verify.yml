# Required checks: set branch protection → require "verify" job to pass before merge.
name: Verify

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  verify:
    runs-on: ubuntu-latest
    env:
      # Build/typecheck only — no live DB required for prisma generate / next build
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/ci?schema=public
      NEXTAUTH_SECRET: ci-build-placeholder-secret-min-32-chars-long
      NEXTAUTH_URL: http://localhost:3000
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prisma generate
        run: npx prisma generate

      - name: Typecheck + production build
        run: npm run verify
